services:
  landing:
    build:
      context: ./site
    restart: always
    networks:
      - traefik-public
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.constraint-label=traefik-public

      - traefik.http.services.${STACK_NAME?Variable not set}-landing.loadbalancer.server.port=80

      - traefik.http.routers.${STACK_NAME?Variable not set}-landing-http.rule=Host(`${DOMAIN?Variable not set}`)
      - traefik.http.routers.${STACK_NAME?Variable not set}-landing-http.entrypoints=http
      - traefik.http.routers.${STACK_NAME?Variable not set}-landing-http.middlewares=https-redirect

      - traefik.http.routers.${STACK_NAME?Variable not set}-landing-https.rule=Host(`${DOMAIN?Variable not set}`)
      - traefik.http.routers.${STACK_NAME?Variable not set}-landing-https.entrypoints=https
      - traefik.http.routers.${STACK_NAME?Variable not set}-landing-https.tls=true
      - traefik.http.routers.${STACK_NAME?Variable not set}-landing-https.tls.certresolver=le

networks:
  traefik-public:
    external: true
