<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UBDM</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --border: #1e1e2e;
      --text: #e0e0e8;
      --muted: #6b6b7b;
      --accent: #7c5cfc;
      --accent-glow: rgba(124, 92, 252, 0.3);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1.6;
    }

    .container {
      text-align: center;
      padding: 2rem;
      max-width: 640px;
    }

    .logo {
      font-size: 4rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, var(--accent) 0%, #a78bfa 50%, #c4b5fd 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }

    .tagline {
      font-size: 1.15rem;
      color: var(--muted);
      margin-bottom: 2.5rem;
      font-weight: 400;
    }

    .divider {
      width: 48px;
      height: 2px;
      background: var(--accent);
      margin: 0 auto 2.5rem;
      border-radius: 1px;
      opacity: 0.6;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 0.5rem 1.25rem;
      font-size: 0.875rem;
      color: var(--muted);
      margin-bottom: 2rem;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 8px rgba(34, 197, 94, 0.5);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .links {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s;
      padding: 0.4rem 0;
      border-bottom: 1px solid transparent;
    }

    .links a:hover {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    footer {
      margin-top: 3rem;
      font-size: 0.8rem;
      color: var(--muted);
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="logo">UBDM</h1>
    <p class="tagline">Something is coming.</p>
    <div class="divider"></div>
    <div class="status">
      <span class="status-dot"></span>
      under construction
    </div>
    <div class="links">
      <a href="mailto:hello@ubdm.wtf">hello@ubdm.wtf</a>
    </div>
    <footer>&copy; 2026 UBDM</footer>
  </div>
</body>
</html>
