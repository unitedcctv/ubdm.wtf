<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UBDM.WTF</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Montserrat', sans-serif;
      background-color: #fcfbf7;
      color: #2c302e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .logo {
      position: fixed;
      left: 50%;
      top: calc(50vh - 2rem);
      transform: translateX(-50%);
      height: 4rem;
      display: flex;
      align-items: center;
      line-height: 1;
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      font-size: 3rem;
      color: #2c302e;
      z-index: 20;
      animation: logoUp 1.2s cubic-bezier(0.22, 0.61, 0.36, 1) 3s forwards;
    }

    @keyframes logoUp {
      from { top: calc(50vh - 2rem); }
      to   { top: 0.5rem; }
    }

    footer {
      position: fixed;
      bottom: 2rem;
      text-align: center;
      font-size: 0.8rem;
      color: #2c302e;
      opacity: 0.5;
    }

    footer a {
      color: #2c302e;
      text-decoration: none;
    }

    footer a:hover {
      opacity: 0.7;
    }

    .carousel-wrapper {
      position: fixed;
      top: 5rem;
      left: 0;
      width: 100vw;
      transform: translateY(100vh);
      height: calc(100vh - 10rem);
      overflow: hidden;
      animation: riseUp 1.2s cubic-bezier(0.22, 0.61, 0.36, 1) 3s forwards;
      z-index: 10;
    }

    .carousel-track {
      display: flex;
      height: 100%;
      gap: 10rem;
      transition: transform 2s cubic-bezier(0.22, 0.61, 0.36, 1);
    }

    .carousel-track img {
      height: 100%;
      width: auto;
      flex-shrink: 0;
    }

    @keyframes riseUp {
      from { transform: translateY(100vh); }
      to   { transform: translateY(0); }
    }

    .carousel-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 3rem;
      height: 3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      border-radius: 50%;
      background: rgba(252, 251, 247, 0.7);
      color: #2c302e;
      font-size: 1.5rem;
      line-height: 1;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.3s ease, background 0.2s ease;
      z-index: 15;
    }

    .carousel-wrapper.over-image .carousel-btn {
      opacity: 1;
    }

    .carousel-btn:hover {
      background: rgba(252, 251, 247, 0.95);
    }

    .carousel-btn.prev { left: 1.5rem; }
    .carousel-btn.next { right: 1.5rem; }
    /* exact left/right set in JS so buttons sit over the image edges */
  </style>
</head>
<body>
  <h1 class="logo">UBDM.wtf</h1>
  <div class="carousel-wrapper">
    <div class="carousel-track" id="carouselTrack">
      <img src="images/nano-banana-2026-06-03T18-49-08.png" alt="Carousel image">
      <img src="images/nano-banana-2026-06-03T18-49-08.png" alt="Carousel image">
    </div>
    <button class="carousel-btn prev" id="prevBtn" aria-label="Previous">&#8249;</button>
    <button class="carousel-btn next" id="nextBtn" aria-label="Next">&#8250;</button>
  </div>
  <footer>
    <a href="mailto:hello@ubdm.wtf">hello@ubdm.wtf</a> &mdash; &copy; 2026 UBDM
  </footer>
  <script>
    const wrapper = document.querySelector('.carousel-wrapper');
    const track = document.getElementById('carouselTrack');
    const images = track.querySelectorAll('img');
    const imageCount = images.length;
    const remPx = parseFloat(getComputedStyle(document.documentElement).fontSize);
    const gapPx = 10 * remPx;
    const TRANSITION = 'transform 2s cubic-bezier(0.22, 0.61, 0.36, 1)';
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    let currentIndex = 0;
    let autoTimer = null;

    function getStep() {
      return images[0].getBoundingClientRect().width + gapPx;
    }

    function centerOffset() {
      return (window.innerWidth - images[0].getBoundingClientRect().width) / 2;
    }

    function applyPosition() {
      track.style.transform = `translateX(${centerOffset() - getStep() * currentIndex}px)`;
      positionButtons();
    }

    function positionButtons() {
      const inset = centerOffset() + 1.5 * remPx;
      prevBtn.style.left = inset + 'px';
      nextBtn.style.right = inset + 'px';
    }

    function snapTo(index) {
      track.style.transition = 'none';
      currentIndex = index;
      applyPosition();
      track.getBoundingClientRect();
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          track.style.transition = TRANSITION;
        });
      });
    }

    function next() {
      currentIndex++;
      applyPosition();
      if (currentIndex >= imageCount - 1) {
        setTimeout(() => snapTo(0), 2000);
      }
    }

    function prev() {
      if (currentIndex <= 0) {
        track.style.transition = 'none';
        currentIndex = imageCount - 1;
        applyPosition();
        track.getBoundingClientRect();
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            track.style.transition = TRANSITION;
            currentIndex--;
            applyPosition();
          });
        });
      } else {
        currentIndex--;
        applyPosition();
      }
    }

    let overImage = false;
    function setOverImage(state) {
      if (state === overImage) return;
      overImage = state;
      if (state) {
        wrapper.classList.add('over-image');
        stopAuto();
      } else {
        wrapper.classList.remove('over-image');
        startAuto();
      }
    }

    function startAuto() {
      stopAuto();
      autoTimer = setInterval(next, 8000);
    }

    function stopAuto() {
      if (autoTimer) {
        clearInterval(autoTimer);
        autoTimer = null;
      }
    }

    function start() {
      track.style.transition = 'none';
      applyPosition();
      requestAnimationFrame(() => {
        track.style.transition = TRANSITION;
      });
      window.addEventListener('resize', applyPosition);

      wrapper.addEventListener('mousemove', (e) => {
        const left = centerOffset();
        const right = window.innerWidth - centerOffset();
        setOverImage(e.clientX >= left && e.clientX <= right);
      });
      wrapper.addEventListener('mouseleave', () => setOverImage(false));
      prevBtn.addEventListener('click', prev);
      nextBtn.addEventListener('click', next);

      setTimeout(() => {
        next();
        startAuto();
      }, 6000);
    }

    if (images[0].complete) {
      start();
    } else {
      images[0].addEventListener('load', start);
    }
  </script>
</body>
</html>
